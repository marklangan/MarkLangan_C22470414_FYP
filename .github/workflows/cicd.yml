name: CI/CD to AKS

on:
  push:
    branches: [ "main" ]
    paths:
      - 'app/**'
      - 'k8s/**'
      - '.github/workflows/cicd.yml'
  workflow_dispatch:                                                 # allows manually trigger from GitHub UI

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  AKS_CLUSTER_NAME: ${{ secrets.AKS_CLUSTER_NAME }}
  AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}


# Pipeline is split into three jobs:
# 1. CI          - builds, tests, scans and pushes the container image
# 2. deploy-dev  - deploys automatically to the dev namespace on every push
# 3. deploy-prod - deploys to prod after manual approval (GitHub Environment gate)




# JOB 1: CI(install -> audit -> test -> build -> scan -> push)
jobs:
  ci:
    name: Build & Test
    runs-on: self-hosted                                           # self-hosted running on my machine - Azure AD restrictions prevent service principal auth on GitHub-hosted runners
    defaults:
      run:
        shell: powershell
        working-directory: app

    outputs:
      image_tag: ${{ steps.build.outputs.image_tag }}             # passed to deploy jobs so they use the exact image that was built and pushed

    steps:
      - name: Checkout code
        uses: actions/checkout@v4                                   # checks out the repo so we can access code and Dockerfile

      - name: Set up Node 18
        uses: actions/setup-node@v4                                 # sets up Node.js environment for npm install and test
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci                                                 # installs dependencies listed in package-lock.json

      # Dependency audit: saves report as artifact instead of silently ignoring
      - name: Dependency audit
        run: |
          npm audit --omit=dev --json | Out-File -FilePath audit-report.json -Encoding utf8
          if ($LASTEXITCODE -ne 0) {
            Write-Host "npm audit found vulnerabilities - see audit-report.json artifact"
            exit 0   # Change 'exit 0' to 'exit 1' to enforce a hard block on vulnerabilities
          }

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-report
          path: app/audit-report.json

      # Tests must pass before the image is built - pipeline stops here on failure
      - name: Run tests
        run: npm test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-coverage
          path: app/coverage/

      - name: Ensure ACR login
        run: |
          $ACR_NAME = $env:ACR_LOGIN_SERVER.Split('.')[0]
          az acr login --name $ACR_NAME

        # Build Docker image (Image is tagged with the git commit SHA for immutable, traceable deployments)
      - name: Build Docker image
        id: build
        run: |
          $IMAGE_TAG = "${{ github.sha }}"
          $IMAGE = "$env:ACR_LOGIN_SERVER/fyp-app:$IMAGE_TAG"
          docker build -t "$IMAGE" .
          # Store tag for later steps and expose as job output
          echo "IMAGE_TAG=$IMAGE_TAG" >> $env:GITHUB_ENV
          echo "IMAGE=$IMAGE" >> $env:GITHUB_ENV
          echo "image_tag=$IMAGE_TAG" >> $env:GITHUB_OUTPUT

      # Trivy scan: hard-fails on CRITICAL vulnerabilities
      - name: Trivy vulnerability scan
        run: |
          trivy image `
            --scanners vuln `
            --severity HIGH,CRITICAL `
            --format table `
            --output trivy-report.txt `
            --exit-code 1 `
            "$env:IMAGE"

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-scan-report
          path: app/trivy-report.txt

      - name: Push image to ACR
        run: docker push "$env:IMAGE"

# JOB 2: CD to DEV  (deploy to dev namespace automatically on every push)
# Runs automatically after CI passes - no approval required
# Deploys to the 'dev' Kubernetes namespace with reduced resource limits


  deploy-dev:
    name: Deploy → dev
    needs: ci
    runs-on: self-hosted
    defaults:
      run:
        shell: powershell
    environment: dev   # maps to GitHub Environment "dev"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set AKS context
        run: |
          az aks get-credentials `
            --resource-group $env:AZURE_RESOURCE_GROUP `
            --name $env:AKS_CLUSTER_NAME `
            --overwrite-existing

        # --dry-run=client makes this idempotent - safe to run on every deployment
      - name: Create dev namespace (idempotent)
        run: kubectl create namespace dev --dry-run=client -o yaml | kubectl apply -f -

        # Helm upgrade --install handles both first-time deploy and rolling updates
      - name: Helm deploy to dev
        run: |
          $IMAGE_TAG = "${{ needs.ci.outputs.image_tag }}"
          helm upgrade --install fyp-app ./k8s/helm/fyp-app `
            --namespace dev `
            --values ./k8s/helm/fyp-app/values.yaml `
            --values ./k8s/helm/fyp-app/values-dev.yaml `
            --set image.tag="$IMAGE_TAG" `
            --set env.APP_VERSION="$IMAGE_TAG" `
            --wait `
            --timeout 5m

      - name: Verify dev rollout
        run: kubectl rollout status deployment/fyp-app --namespace dev --timeout=120s

      - name: Show dev pod status
        run: kubectl get pods --namespace dev -o wide


  # JOB 3: CD to PROD  (requires manual approval via GitHub Environment)
  # Deploys to the 'prod' namespace with 2 replicas and HPA enabled (see values-prod.yaml)

  deploy-prod:
    name: Deploy → prod
    needs: [ci, deploy-dev]
    runs-on: self-hosted
    defaults:
      run:
        shell: powershell
    environment: prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set AKS context
        run: |
          az aks get-credentials `
            --resource-group $env:AZURE_RESOURCE_GROUP `
            --name $env:AKS_CLUSTER_NAME `
            --overwrite-existing

      - name: Create prod namespace (idempotent)
        run: kubectl create namespace prod --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm deploy to prod
        run: |
          $IMAGE_TAG = "${{ needs.ci.outputs.image_tag }}"
          helm upgrade --install fyp-app ./k8s/helm/fyp-app `
            --namespace prod `
            --values ./k8s/helm/fyp-app/values.yaml `
            --values ./k8s/helm/fyp-app/values-prod.yaml `
            --set image.tag="$IMAGE_TAG" `
            --set env.APP_VERSION="$IMAGE_TAG" `
            --wait `
            --timeout 5m

      - name: Verify prod rollout
        run: kubectl rollout status deployment/fyp-app --namespace prod --timeout=180s

      - name: Show prod pod status
        run: kubectl get pods --namespace prod -o wide
